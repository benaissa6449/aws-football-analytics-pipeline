# Fichier de Configuration pour le Développement Local

# AWS Configuration
[default]
region = eu-west-1
output = json

# Variables pour Terraform
[terraform]
aws_region = eu-west-1
environment = production
project_name = football-pipeline
bucket_prefix = foot-data

# Kinesis Configuration
[kinesis]
stream_name = goals-stream
region = eu-west-1
on_demand = true

# Firehose Configuration
[firehose]
delivery_stream_name = goals-firehose
s3_prefix = goals_raw/
buffer_size_mb = 5
buffer_interval_sec = 300

# Glue Configuration
[glue]
database_name = football_db
job_name = goals-etl
crawler_name = football-crawler
job_script_path = s3://foot-data-bucket/scripts/glue_job_etl.py
job_language = python
job_version = 4.0
worker_type = G.2X
num_workers = 2

# Athena Configuration
[athena]
workgroup_name = football-workgroup
catalog = AwsDataCatalog
output_location = s3://foot-data-bucket-query-results/results/

# S3 Configuration
[s3]
data_bucket = foot-data-bucket
query_results_bucket = foot-data-bucket-query-results
data_prefix = football-pipeline/
retention_days = 365

# Logging
[logging]
level = INFO
cloudwatch_group = /aws-glue/football-pipeline
cloudwatch_stream = etl-logs

# Development
[dev]
debug = true
local_mode = false
vpc_enabled = true
